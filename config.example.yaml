# NabuGate example configuration for local development.

server:
  port: 8080
  api_keys:
    - "nabu_dev_key_change_me"
  keys:
    - key: "crm_prod_key_change_me"
      project: "crm"
      # Aliases and whole passthrough provider namespaces ("parspack/*" covers
      # every parspack/<model>, including nested IDs like parspack/openai/gpt-5.5;
      # "avalai/*" and "gapgpt/*" do the same for those aggregators).
      allow: ["nabu-fast", "nabu-embed", "parspack/*", "avalai/*", "gapgpt/*", "nabu-avalai", "nabu-gap", "nabu-arvan"]
      rate_limit: 120

providers:
  openai:
    enabled: true
    type: openai
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"

  groq:
    enabled: true
    type: openai
    base_url: "https://api.groq.com/openai/v1"
    api_key_env: "GROQ_API_KEY"

  openrouter:
    enabled: true
    type: openai
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"

  dahl:
    enabled: true
    type: openai
    base_url: "https://inference.dahl.global/v1"
    api_key_env: "DAHL_API_KEY"

  parspack:
    enabled: true
    type: openai
    base_url: "https://my.parspack.com/api/aistudio/api/v1"
    api_key_env: "PARSPACK_API_KEY"
    # Parspack is a multi-model provider: passthrough exposes its whole
    # catalogue via live /v1/models discovery and lets callers route straight
    # to "parspack/<model>" (e.g. "parspack/openai/gpt-5.5") without an alias.
    passthrough: true
    # Optional: advertise a curated set even if live discovery is unavailable.
    # models:
    #   - "openai/gpt-5.5"
    #   - "anthropic/claude-sonnet-4.6"

  # AvalAI (avalai.ir) — Iranian OpenAI-wire aggregator with rial billing and
  # Persian docs, fronting GPT, Claude, Gemini, Qwen, Llama, Mistral, Grok,
  # DeepSeek, FLUX, ElevenLabs, MiniMax … behind one key. Fully OpenAI compatible
  # (chat, responses, images, embeddings, audio, /v1/models), so passthrough
  # discovery works: address any model directly as "avalai/<model>".
  avalai:
    enabled: true
    type: openai
    base_url: "https://api.avalai.ir/v1"
    api_key_env: "AVALAI_API_KEY"
    passthrough: true

  # GapGPT (gapgpt.app) — Iranian OpenAI-wire aggregator, rial billing. Multi-
  # model: GPT-5.6 (Sol/Terra/Luna), Claude, Gemini, Grok, DeepSeek, Qwen plus
  # image (GPT-Image / DALL·E / Imagen / FLUX), Whisper STT, TTS and embeddings.
  # passthrough → address any model as "gapgpt/<model>". The static `models`
  # below is just a curated advertisement; live /v1/models discovery supplements
  # it. External CDN mirror base_url: https://api.gapapi.com/v1
  gapgpt:
    enabled: true
    type: openai
    base_url: "https://api.gapgpt.app/v1"
    api_key_env: "GAPGPT_API_KEY"
    passthrough: true
    models:
      - "gpt-5.6-sol"
      - "gpt-5.6-luna"
      - "claude-sonnet-5"
      - "claude-opus-4-8"
      - "gemini-3.1-pro-preview"
      - "deepseek-v4-pro"
      - "gapgpt-qwen-3.6"

  # ArvanCloud AIaaS (arvancloud.ir) — private per-model endpoints on Iranian
  # infra. Each endpoint you create in the panel gets its own URL + access key
  # and serves ONE hosted model (e.g. DeepSeek-R1). The chat/completions body is
  # OpenAI-wire, but auth uses the "apikey <key>" scheme (NOT "Bearer"), so set
  # auth_scheme. Point base_url at the endpoint URL (no trailing /v1) and route
  # to it with the nabu-arvan alias below. Not passthrough — one endpoint is one
  # model, and there is no /v1/models to discover.
  arvan:
    enabled: true
    type: openai
    base_url: "${ARVAN_AIAAS_ENDPOINT}"   # the per-endpoint URL from the ArvanCloud panel
    api_key_env: "ARVAN_API_KEY"
    auth_scheme: "apikey"

  anthropic:
    enabled: true
    type: anthropic
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"

  gemini:
    enabled: true
    type: gemini
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    api_key_env: "GEMINI_API_KEY"

  # Pexels stock photos as an image source: an image alias pointed here searches
  # Pexels for the prompt and returns real photos (base64, like a generated
  # image), so projects get stock imagery through the gateway.
  pexels:
    enabled: true
    type: pexels
    base_url: "https://api.pexels.com/v1"
    api_key_env: "PEXELS_API_KEY"

  ollama:
    enabled: true
    type: openai
    base_url: "${OLLAMA_BASE_URL}"

models:
  nabu-fast:
    primary:
      provider: dahl
      model: "MiniMaxAI/MiniMax-M2.7"
    fallback:
      - provider: groq
        model: "llama-3.1-70b-versatile"
      - provider: openai
        model: "gpt-4o-mini"
      - provider: anthropic
        model: "claude-3-5-haiku-latest"

  nabu-smart:
    primary:
      provider: dahl
      model: "moonshotai/Kimi-K2.6"
    fallback:
      - provider: openai
        model: "gpt-4o"
      - provider: anthropic
        model: "claude-3-5-sonnet-latest"
      - provider: gemini
        model: "gemini-1.5-pro"

  nabu-cheap:
    primary:
      provider: openrouter
      model: "meta-llama/llama-3.1-8b-instruct"
    fallback:
      - provider: groq
        model: "llama-3.1-8b-instant"
      - provider: dahl
        model: "MiniMaxAI/MiniMax-M2.7"

  nabu-vision:
    primary:
      provider: openai
      model: "gpt-4o"
    fallback:
      - provider: gemini
        model: "gemini-1.5-pro"

  nabu-minimax:
    primary:
      provider: dahl
      model: "MiniMaxAI/MiniMax-M2.7"
    fallback:
      - provider: groq
        model: "llama-3.1-70b-versatile"

  nabu-kimi:
    primary:
      provider: dahl
      model: "moonshotai/Kimi-K2.6"
    fallback:
      - provider: openai
        model: "gpt-4o"

  nabu-local:
    primary:
      provider: ollama
      model: "llama3.1"

  nabu-parspack:
    primary:
      provider: parspack
      model: "openai/gpt-5.5"
    fallback:
      - provider: parspack
        model: "anthropic/claude-sonnet-4.6"
      - provider: parspack
        model: "google/gemini-2.5-flash"

  # AvalAI-backed chat alias. Edit the model IDs to any AvalAI catalogue id
  # (or address them directly as "avalai/<model>" thanks to passthrough).
  nabu-avalai:
    primary:
      provider: avalai
      model: "gpt-5.5"
    fallback:
      - provider: avalai
        model: "gemini-2.5-flash"

  # GapGPT-backed chat alias (or call "gapgpt/<model>" directly via passthrough).
  nabu-gap:
    primary:
      provider: gapgpt
      model: "gpt-5.6-luna"
    fallback:
      - provider: gapgpt
        model: "claude-sonnet-5"
      - provider: gapgpt
        model: "gemini-3.1-flash-lite"

  # ArvanCloud AIaaS-backed chat alias. Set the model to whatever your endpoint
  # serves; base_url + apikey auth come from the `arvan` provider above.
  nabu-arvan:
    primary:
      provider: arvan
      model: "DeepSeek-R1-qwen-7b-awq"

images:
  nabu-image:
    primary:
      provider: openai
      model: "gpt-image-1"
    fallback:
      - provider: gemini
        model: "gemini-2.5-flash-image"
      # Stock-photo fallback: if generation providers are down/keyless, serve a
      # real Pexels photo for the prompt instead of failing.
      - provider: pexels
        model: "search"

  # Stock photos only (no AI generation): search Pexels for the prompt. The
  # "model" is just the endpoint hint ("search"); an empty prompt uses "curated".
  nabu-photo:
    primary:
      provider: pexels
      model: "search"

audio:
  nabu-voice:
    primary:
      provider: openai
      model: "gpt-4o-mini-tts"
    fallback:
      - provider: gemini
        model: "gemini-2.5-flash-preview-tts"

embeddings:
  nabu-embed:
    primary:
      provider: openai
      model: "text-embedding-3-small"
    fallback:
      - provider: gemini
        model: "text-embedding-004"

# Sub-agents: named assistants = a system prompt + default params layered on top
# of a chat alias, addressable as a "model" (POST /v1/chat/completions with
# model: "cine-motion-designer"). Two ways to define them, and they compose:
#
#   1. Inline, right here under `agents:` (map key = agent name).
#   2. From outside the main config, as one YAML file per agent in `agents_dir`
#      (see ./agents for the cinematic-scrollytelling squad). Great for dropping
#      in a new specialist without touching this file.
#
# Grant a project key access with a glob, e.g. allow: ["cine-*"].
agents_dir: "./agents"

agents:
  # A minimal inline example. `model` points at any existing chat alias (or a
  # "<provider>/<model>" passthrough); the router's fallback still applies.
  nabu-assistant:
    description: "General helpful assistant on the fast alias."
    model: nabu-fast
    system: "You are NabuGate's built-in assistant. Be concise and helpful."
    temperature: 0.5

pricing:
  "openai/gpt-4o": { input: 2.5, output: 10 }
  "openai/gpt-4o-mini": { input: 0.15, output: 0.6 }
  "openai/text-embedding-3-small": { input: 0.02, output: 0 }
  "anthropic/claude-3-5-sonnet-latest": { input: 3, output: 15 }
  "anthropic/claude-3-5-haiku-latest": { input: 0.8, output: 4 }
  "gemini/gemini-1.5-pro": { input: 1.25, output: 5 }
  "groq/llama-3.1-70b-versatile": { input: 0.59, output: 0.79 }
  # GapGPT list prices (USD per 1M tokens), keyed by provider/model.
  "gapgpt/gpt-5.6-sol": { input: 5, output: 30 }
  "gapgpt/gpt-5.6-luna": { input: 1, output: 6 }
  "gapgpt/claude-sonnet-5": { input: 2, output: 10 }
