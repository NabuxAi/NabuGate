# NabuGate gateway — Coolify / Docker Compose deployment.
services:
  nabugate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NABU_CONFIG=/app/config.yaml
      # The image already bakes a secret-free default config, so you do NOT need
      # to provide a config to boot. Set NABU_API_KEY (below) + a provider key
      # and it works out of the box. Override the routing only if you need to:
      # paste a whole config here (mount-free) or mount a file (see volumes note).
      - NABU_CONFIG_YAML=${NABU_CONFIG_YAML:-}
      # Gateway admin key projects must send as `Authorization: Bearer …`.
      # REQUIRED: the gateway refuses to start open unless this is set (or you
      # set NABU_ALLOW_NO_AUTH=1 to explicitly run without auth for local dev).
      - NABU_API_KEY=${NABU_API_KEY:-}
      - NABU_ALLOW_NO_AUTH=${NABU_ALLOW_NO_AUTH:-}
      # Coolify magic variable: auto-assign a domain for this service and route
      # it to the gateway's port 8080. Coolify fills it in (or use your own
      # domain under Configuration → Domains). Ignored outside Coolify.
      - SERVICE_FQDN_NABUGATE_8080
      # Provider secrets (set the ones you enable in your config)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DAHL_API_KEY=${DAHL_API_KEY}
      # Ollama (local, on-prem models behind the nabu-local alias). Keyless:
      # set the OpenAI-compatible base URL incl. /v1 to enable, e.g.
      # http://ollama:11434/v1. Left empty, the ollama provider is skipped.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - PARSPACK_API_KEY=${PARSPACK_API_KEY}
      # 9Router — the self-hosted `ninerouter` service below. Points the 9router
      # provider (and its "9router/*" passthrough) at it over the internal Docker
      # network. Blank it to disable, or override with a tunnel URL if 9Router
      # runs elsewhere.
      - NINEROUTER_BASE_URL=${NINEROUTER_BASE_URL:-http://ninerouter:20128/v1}
    # Coolify's reverse proxy reaches the gateway over the internal Docker
    # network, so the port only needs to be EXPOSEd, not published to the host.
    # Publishing to a random host port (`ports: - "8080"`) does NOT make the
    # proxy route to it — that is why the domain returned nothing before.
    expose:
      - "8080"
    # For a plain local `docker compose up` (no proxy), publish to the host
    # instead by uncommenting:
    # ports:
    #   - "8080:8080"
    # To load config from a file instead of NABU_CONFIG_YAML, create ./config.yaml
    # FIRST, then uncomment the mount below. Do not enable it without the file:
    # Docker turns a missing bind-mount source into an empty directory and the
    # gateway refuses to start (crash loop).
    # volumes:
    #   - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/nabugate", "-config", "/dev/null"]
      disable: true # distroless has no shell; rely on the platform's HTTP check on /healthz

  # 9Router — self-hosted OpenAI-compatible smart router (60+ providers, 3-tier
  # fallback) that backs NabuGate's "9router/*" passthrough and nabu-9router
  # alias. Official image; connected providers, keys and quota persist in the
  # ninerouter-data volume (SQLite at /app/data/db/data.sqlite) so they survive
  # redeploys. NabuGate calls it at http://ninerouter:20128/v1 (see
  # NINEROUTER_BASE_URL above); one-time provider hookup is done in its dashboard.
  ninerouter:
    image: decolua/9router:latest
    environment:
      - DATA_DIR=/app/data
      - PORT=20128
      - HOSTNAME=0.0.0.0        # bind all interfaces so the nabugate container can reach it
      # SECURITY: the 9Router dashboard has NO built-in auth and holds your
      # provider OAuth tokens / API keys. This Coolify magic var assigns a PUBLIC
      # domain routed to port 20128 so you can open the dashboard and connect
      # providers — but anyone with the URL then controls the router. Protect it
      # in Coolify (service → Basic Auth or an IP allow-list), or comment this out
      # and reach the dashboard over an SSH tunnel / Tailscale instead. Once
      # providers are connected it runs headless and NabuGate uses it internally.
      - SERVICE_FQDN_NINEROUTER_20128
    # Reached by nabugate over the internal Docker network; only EXPOSE it (the
    # Coolify proxy routes the domain above to this port, like the gateway does).
    expose:
      - "20128"
    volumes:
      - ninerouter-data:/app/data
    restart: unless-stopped

volumes:
  ninerouter-data:
    name: ninerouter-data
