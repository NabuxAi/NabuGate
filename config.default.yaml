# NabuGate — default config baked into the Docker image (/app/config.yaml).
#
# This file contains no secrets. Gateway and provider keys are injected through
# environment variables at runtime. Providers without an available key are
# skipped automatically.

server:
  port: 8080
  api_keys:
    - "${NABU_API_KEY}"

providers:
  openai:
    enabled: true
    type: openai
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"

  groq:
    enabled: true
    type: openai
    base_url: "https://api.groq.com/openai/v1"
    api_key_env: "GROQ_API_KEY"

  openrouter:
    enabled: true
    type: openai
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"

  # Cloudflare Workers AI (developers.cloudflare.com/workers-ai) — OpenAI-wire
  # serverless inference (Llama / gpt-oss / Qwen / Mistral / DeepSeek / bge). The
  # account id is templated into base_url; auth is a Bearer token. Both
  # CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_KEY are required — skipped when the
  # key is unset. passthrough exposes "cloudflare/@cf/<author>/<model>"; Workers
  # AI has no /v1/models, so the static list below is what /v1/models advertises.
  cloudflare:
    enabled: true
    type: openai
    base_url: "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/ai/v1"
    api_key_env: "CLOUDFLARE_API_KEY"
    passthrough: true
    models:
      - "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
      - "@cf/meta/llama-3.1-8b-instruct"
      - "@cf/openai/gpt-oss-120b"
      - "@cf/baai/bge-large-en-v1.5"

  # TokenRouter (api.tokenrouter.io) — OpenAI-wire router fronting 300+ models
  # (OpenAI / Claude / Gemini / Llama / DeepSeek / GLM …) with "auto:*" routing.
  # passthrough exposes "tokenrouter/<model>" (e.g. tokenrouter/glm-5.2,
  # tokenrouter/auto:balance); its /v1/models feeds live discovery. Skipped when
  # TOKENROUTER_API_KEY is unset.
  tokenrouter:
    enabled: true
    type: openai
    base_url: "https://api.tokenrouter.io/v1"
    api_key_env: "TOKENROUTER_API_KEY"
    passthrough: true

  dahl:
    enabled: true
    type: openai
    base_url: "https://inference.dahl.global/v1"
    api_key_env: "DAHL_API_KEY"

  parspack:
    enabled: true
    type: openai
    base_url: "https://my.parspack.com/api/aistudio/api/v1"
    api_key_env: "PARSPACK_API_KEY"
    # Parspack AI Studio is not a single model — it is a provider hosting many.
    # passthrough lets callers address any of them directly as
    # "parspack/<model>" (e.g. "parspack/openai/gpt-5.5") with no per-model
    # alias, and surfaces its whole catalogue on /v1/models via live discovery
    # of the provider's own /v1/models endpoint. Grant access with
    # allow: ["parspack/*"] on a project key.
    passthrough: true

  # AvalAI (avalai.ir) — OpenAI-wire aggregator (GPT / Claude / Gemini / Qwen /
  # Llama / Mistral / Grok / DeepSeek / …) with rial billing. Fully OpenAI
  # compatible, so passthrough discovery surfaces its catalogue as "avalai/*".
  # Skipped automatically when AVALAI_API_KEY is unset.
  avalai:
    enabled: true
    type: openai
    base_url: "https://api.avalai.ir/v1"
    api_key_env: "AVALAI_API_KEY"
    passthrough: true

  # GapGPT (gapgpt.app) — OpenAI-wire aggregator, rial billing. passthrough
  # exposes its catalogue as "gapgpt/*"; the static models are a curated
  # fallback for /v1/models. Skipped when GAPGPT_API_KEY is unset.
  gapgpt:
    enabled: true
    type: openai
    base_url: "https://api.gapgpt.app/v1"
    api_key_env: "GAPGPT_API_KEY"
    passthrough: true
    models:
      - "gpt-5.6-sol"
      - "gpt-5.6-luna"
      - "claude-sonnet-5"
      - "gemini-3.1-pro-preview"
      - "deepseek-v4-pro"

  # ArvanCloud AIaaS (arvancloud.ir) — private per-model endpoint on Iranian
  # infra. OpenAI-wire chat body, but auth is "apikey <key>" not "Bearer", hence
  # auth_scheme. Set ARVAN_AIAAS_ENDPOINT to your endpoint URL and ARVAN_API_KEY
  # to its access key; skipped when either is unset. Not passthrough (one model).
  arvan:
    enabled: true
    type: openai
    base_url: "${ARVAN_AIAAS_ENDPOINT}"
    api_key_env: "ARVAN_API_KEY"
    auth_scheme: "apikey"

  anthropic:
    enabled: true
    type: anthropic
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"

  gemini:
    enabled: true
    type: gemini
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    api_key_env: "GEMINI_API_KEY"

  # Pexels stock photos as an image source. An image alias pointed here searches
  # Pexels for the prompt and returns real photos. Skipped when PEXELS_API_KEY
  # is unset, like any other keyed provider.
  pexels:
    enabled: true
    type: pexels
    base_url: "https://api.pexels.com/v1"
    api_key_env: "PEXELS_API_KEY"

  ollama:
    enabled: true
    type: openai
    base_url: "${OLLAMA_BASE_URL}"

models:
  nabu-fast:
    primary:
      provider: dahl
      model: "MiniMaxAI/MiniMax-M2.7"
    fallback:
      - provider: groq
        model: "llama-3.1-70b-versatile"
      - provider: openai
        model: "gpt-4o-mini"
      - provider: anthropic
        model: "claude-3-5-haiku-latest"

  nabu-smart:
    primary:
      provider: dahl
      model: "moonshotai/Kimi-K2.6"
    fallback:
      - provider: openai
        model: "gpt-4o"
      - provider: anthropic
        model: "claude-3-5-sonnet-latest"
      - provider: gemini
        model: "gemini-1.5-pro"

  nabu-cheap:
    primary:
      provider: openrouter
      model: "meta-llama/llama-3.1-8b-instruct"
    fallback:
      - provider: groq
        model: "llama-3.1-8b-instant"
      - provider: dahl
        model: "MiniMaxAI/MiniMax-M2.7"

  nabu-vision:
    primary:
      provider: openai
      model: "gpt-4o"
    fallback:
      - provider: gemini
        model: "gemini-1.5-pro"

  nabu-minimax:
    primary:
      provider: dahl
      model: "MiniMaxAI/MiniMax-M2.7"
    fallback:
      - provider: groq
        model: "llama-3.1-70b-versatile"

  nabu-kimi:
    primary:
      provider: dahl
      model: "moonshotai/Kimi-K2.6"
    fallback:
      - provider: openai
        model: "gpt-4o"

  nabu-local:
    primary:
      provider: ollama
      model: "llama3.1"

  nabu-parspack:
    primary:
      provider: parspack
      model: "openai/gpt-5.5"
    fallback:
      - provider: parspack
        model: "anthropic/claude-sonnet-4.6"
      - provider: parspack
        model: "google/gemini-2.5-flash"

  nabu-avalai:
    primary:
      provider: avalai
      model: "gpt-5.5"
    fallback:
      - provider: avalai
        model: "gemini-2.5-flash"

  nabu-gap:
    primary:
      provider: gapgpt
      model: "gpt-5.6-luna"
    fallback:
      - provider: gapgpt
        model: "claude-sonnet-5"

  nabu-arvan:
    primary:
      provider: arvan
      model: "DeepSeek-R1-qwen-7b-awq"

  # Cloudflare Workers AI-backed chat alias (or call the passthrough directly:
  # "cloudflare/@cf/<author>/<model>").
  nabu-cloudflare:
    primary:
      provider: cloudflare
      model: "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
    fallback:
      - provider: cloudflare
        model: "@cf/meta/llama-3.1-8b-instruct"

  # TokenRouter-backed chat alias using its smart "auto:balance" routing (or call
  # "tokenrouter/<model>" directly via passthrough, e.g. "tokenrouter/glm-5.2").
  nabu-tokenrouter:
    primary:
      provider: tokenrouter
      model: "auto:balance"
    fallback:
      - provider: tokenrouter
        model: "gpt-4o"

images:
  nabu-image:
    primary:
      provider: openai
      model: "gpt-image-1"
    fallback:
      - provider: gemini
        model: "gemini-2.5-flash-image"
      - provider: pexels
        model: "search"

  # Stock photos only: search Pexels for the prompt (empty prompt → curated).
  nabu-photo:
    primary:
      provider: pexels
      model: "search"

audio:
  nabu-voice:
    primary:
      provider: openai
      model: "gpt-4o-mini-tts"
    fallback:
      - provider: gemini
        model: "gemini-2.5-flash-preview-tts"

embeddings:
  nabu-embed:
    primary:
      provider: openai
      model: "text-embedding-3-small"
    fallback:
      - provider: gemini
        model: "text-embedding-004"
      - provider: cloudflare
        model: "@cf/baai/bge-large-en-v1.5"

# Sub-agents (system prompt + defaults over an alias, addressable as a "model").
# The Cinematic Scrollytelling squad ships as one YAML file per agent under
# /app/agents in the image (./agents in the repo). Add your own inline under an
# `agents:` map or as more files in this directory. Grant with allow: ["cine-*"].
agents_dir: "/app/agents"

pricing:
  "openai/gpt-4o": { input: 2.5, output: 10 }
  "openai/gpt-4o-mini": { input: 0.15, output: 0.6 }
  "openai/text-embedding-3-small": { input: 0.02, output: 0 }
  "anthropic/claude-3-5-sonnet-latest": { input: 3, output: 15 }
  "anthropic/claude-3-5-haiku-latest": { input: 0.8, output: 4 }
  "gemini/gemini-1.5-pro": { input: 1.25, output: 5 }
  "groq/llama-3.1-70b-versatile": { input: 0.59, output: 0.79 }
