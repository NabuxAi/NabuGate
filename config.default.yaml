# NabuGate — default config baked into the Docker image (/app/config.yaml).
#
# This file contains no secrets. Gateway and provider keys are injected through
# environment variables at runtime. Providers without an available key are
# skipped automatically.

server:
  port: 8080
  api_keys:
    - "${NABU_API_KEY}"

providers:
  openai:
    enabled: true
    type: openai
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"

  groq:
    enabled: true
    type: openai
    base_url: "https://api.groq.com/openai/v1"
    api_key_env: "GROQ_API_KEY"

  openrouter:
    enabled: true
    type: openai
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"

  dahl:
    enabled: true
    type: openai
    base_url: "https://inference.dahl.global/v1"
    api_key_env: "DAHL_API_KEY"

  parspack:
    enabled: true
    type: openai
    base_url: "https://my.parspack.com/api/aistudio/api/v1"
    api_key_env: "PARSPACK_API_KEY"
    # Parspack AI Studio is not a single model — it is a provider hosting many.
    # passthrough lets callers address any of them directly as
    # "parspack/<model>" (e.g. "parspack/openai/gpt-5.5") with no per-model
    # alias, and surfaces its whole catalogue on /v1/models via live discovery
    # of the provider's own /v1/models endpoint. Grant access with
    # allow: ["parspack/*"] on a project key.
    passthrough: true

  anthropic:
    enabled: true
    type: anthropic
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"

  gemini:
    enabled: true
    type: gemini
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    api_key_env: "GEMINI_API_KEY"

  ollama:
    enabled: true
    type: openai
    base_url: "${OLLAMA_BASE_URL}"

models:
  nabu-fast:
    primary:
      provider: dahl
      model: "MiniMaxAI/MiniMax-M2.7"
    fallback:
      - provider: groq
        model: "llama-3.1-70b-versatile"
      - provider: openai
        model: "gpt-4o-mini"
      - provider: anthropic
        model: "claude-3-5-haiku-latest"

  nabu-smart:
    primary:
      provider: dahl
      model: "moonshotai/Kimi-K2.6"
    fallback:
      - provider: openai
        model: "gpt-4o"
      - provider: anthropic
        model: "claude-3-5-sonnet-latest"
      - provider: gemini
        model: "gemini-1.5-pro"

  nabu-cheap:
    primary:
      provider: openrouter
      model: "meta-llama/llama-3.1-8b-instruct"
    fallback:
      - provider: groq
        model: "llama-3.1-8b-instant"
      - provider: dahl
        model: "MiniMaxAI/MiniMax-M2.7"

  nabu-vision:
    primary:
      provider: openai
      model: "gpt-4o"
    fallback:
      - provider: gemini
        model: "gemini-1.5-pro"

  nabu-minimax:
    primary:
      provider: dahl
      model: "MiniMaxAI/MiniMax-M2.7"
    fallback:
      - provider: groq
        model: "llama-3.1-70b-versatile"

  nabu-kimi:
    primary:
      provider: dahl
      model: "moonshotai/Kimi-K2.6"
    fallback:
      - provider: openai
        model: "gpt-4o"

  nabu-local:
    primary:
      provider: ollama
      model: "llama3.1"

  nabu-parspack:
    primary:
      provider: parspack
      model: "openai/gpt-5.5"
    fallback:
      - provider: parspack
        model: "anthropic/claude-sonnet-4.6"
      - provider: parspack
        model: "google/gemini-2.5-flash"

images:
  nabu-image:
    primary:
      provider: openai
      model: "gpt-image-1"
    fallback:
      - provider: gemini
        model: "gemini-2.5-flash-image"

audio:
  nabu-voice:
    primary:
      provider: openai
      model: "gpt-4o-mini-tts"
    fallback:
      - provider: gemini
        model: "gemini-2.5-flash-preview-tts"

embeddings:
  nabu-embed:
    primary:
      provider: openai
      model: "text-embedding-3-small"
    fallback:
      - provider: gemini
        model: "text-embedding-004"

pricing:
  "openai/gpt-4o": { input: 2.5, output: 10 }
  "openai/gpt-4o-mini": { input: 0.15, output: 0.6 }
  "openai/text-embedding-3-small": { input: 0.02, output: 0 }
  "anthropic/claude-3-5-sonnet-latest": { input: 3, output: 15 }
  "anthropic/claude-3-5-haiku-latest": { input: 0.8, output: 4 }
  "gemini/gemini-1.5-pro": { input: 1.25, output: 5 }
  "groq/llama-3.1-70b-versatile": { input: 0.59, output: 0.79 }
